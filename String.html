<!DOCTYPE html>
<html>

<head>
    <title>Dancing form</title>
    <script defer>
        function onClickDisplay() {
            debugger;
            var firstName = document.getElementById("txtFirstName").value;
            var secondName = document.getElementById("txtSecondName").value;
            var email = document.getElementById("txtEmail").value;
            document.getElementById("pResult").innerHTML="my firstname is:"+firstName+ ", my second name is:"+secondName+",my email is:"+email+"."
            // alert(firstName);
            // alert(secondName);
            // alert(email);
            // alert (firstName+' '+ +secondName+email)
            // alert ("my firstname is:"+firstName+ ", my second name is:"+secondName+",my email is:"+email+".")
            document.getElementById("pResult").innerHTML=`my firstname is:${firstName}, my second name is ${secondName} ,my email is ${email}.`
        }
    </script>
</head>

<body>
    <label>First Name</label>
    <input id="txtFirstName" type="text" placeholder="enter first name"></br>
    <label>Second Name</label>
    <input id="txtSecondName" type="text" placeholder="enter second name"></br>
    <label>Email</label>
    <input id="txtEmail" type="email" placeholder="enter your email"></br>
    <button id="btnResult" onclick="onClickDisplay()">Display</button>
    <p id="pResult"></p>
</body>

</html>
