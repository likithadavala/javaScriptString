<!DOCTYPE html>
<html>
<head>
    <title>Prime Numbers</title>
    <script defer>
        debugger;
        function onClickNumber(){
            var number=Number(document.getElementById("inputNumber").value);
            var result=document.getElementById("pResult");

            if(num<=1){
                 result.innerText =number + (" Not Prime");
            }
            else if(num ==2){
                result.innerText = number+(" Prime");
            }
            else if(num % 2==0){
                result.innerText = number+("Not prime");
            }
            else {
                result.innerText = number+("Prime");
            }                
        }
    </script>

</head>
<body>
    <label id="numInput">Enter a number:</label>
    <input id="inputNumber" type="number"><br>
    
    <button id="resultbtn"  onclick="onClickNumber()">Prime</button>
    <p id="pResult"></p>
</body>
</html>
