<!DOCTYPE html>
<head>
    <title>Divison numbers</title>
    <script>
        function onClickMedivision(){
            debugger;
            var firstNumber=document.getElementById("txtFirstNumber").value;
            var secondNumber=document.getElementById("txtSecondNumber").value;
            var divResult=firstNumber/secondNumber
            document.getElementById("pResult").innerHTML= divResult;
                }
    </script>
</head>
<body>
    <label>firstNumber</label>
    <input  id="txtFirstNumber"   type="number" placeholder="enter firstNumber"></br>
    <label>secondNumber</label>
    <input id="txtSecondNumber" type="number" placeholder="enter secondNumber"></br>
    <button id="btndiv" onclick="onClickMedivision()">Division</button>
    <p id="pResult"></p>
</body>
</html>
