<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Calling</title>
    <script>
        function onClickClickMe() {
            debugger;
            var pElement = document.getElementById("pContext").textContent;
            alert(pElement);
        }
    </script>
</head>

<body>
    <h1>Element Calling</h1>
    <p id="pContext">This page demonstrates how to call an element using JavaScript.</p>
    <button id="btnClickMe" onclick="onClickClickMe()">Click Me</button> 
</body>
</html>
