<!DOCTYPE html>
<html>

<head>
    <title> Palindrome Number</title>
    <script defer>
        function isPalindrome(num) {
            let original = num;
            let reversed = 0;

            while (num > 0) {
                let digit = num % 10;
                reversed = reversed * 10 + digit;
                num = Math.floor(num / 10);
            }

            return original === reversed;
        }
    </script>
</head>

<body>
    <label>Input Number</label>
    <input id="txtInputNumber" type="number">
    <button id="btnSubmit" onclick="onClickPalindromeNumber()">Submit</button>
    <P id="pResult"></P>
    <label></label>
</body>

</html>
