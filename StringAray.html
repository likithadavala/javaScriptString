<!DOCTYPE html>
<html>
    <head>
        <title>Dancing Studio</title>
        <script defer>
            function onClickPrint(){
                var name=document.getElementById("txtName").value;
                document.getElementById("pPrint").innerHTML=name [0];
                document.getElementById("pLength").innerHTML=name.length;
                document.getElementById("pLastCharacter").innerHTML=name[name.length-1];
                document.getElementById("pResult").innerHTML=`${name[0]},${name[1]},${name[2]},${name[3]},${name[4]},${name[5]},${name[6]}`                                                                         
            }
        </script>

    </head>
    <body>
        <label>Name</label>
        <input id="txtName" type="text" placeholder="enter your name"></br>
        <button id="btnPrint" onclick="onClickPrint()">print</button>
        <p id="pPrint"></p>
        <p id="pLength"></p>
        <p id="pLastCharacter"></p>
        <p id="pResult"></p>
    </body>
</html>
