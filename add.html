<!DOCTYPE html>
<html>
<head>
    <title>adding numbers</title>
    <script defer>
        function onClickAdd() {
            debugger;
            var firstNumber =Number(document.getElementById("txtFirstNumber").value);
            var secondNumber = Number(document.getElementById("txtSecondNumber").value);
            var addResult = firstNumber + secondNumber;
            document.getElementById("pResult").innerHTML = addResult;
        }

    </script>
</head>

<body>
    <label>First Number</label>
    <input type="number" id="txtFirstNumber" placeholder="enter first number"></br>
    <label>Second Number</label>
    <input id="txtSecondNumber" type="number" placeholder="enter second number"></br>
    <button id="btnAdd" onclick="onClickAdd()">add</button>
    <p id="pResult"></p>
</body>

</html>
