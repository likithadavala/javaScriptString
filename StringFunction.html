<!DOCTYPE html>
<html>
    <head>
        <title>Dancing Studio</title>
        <script defer>
            function onClickUpperCase(){
                debugger;
                var name=document.getElementById("txtName").value;
                document.getElementById("pResult").innerHTML=name.toUpperCase();

            }
            function onClickLowerCase(){
                debugger;
                var name=document.getElementById("txtName").value;
                document.getElementById("pResult").innerHTML=name.toLowerCase();
            
            }
            function onClickTrim(){
                debugger;
                var name=document.getElementById("txtName").value;
                document.getElementById("pResult").innerHTML=name.trim();
            }
            function onClickTrimStart(){
                debugger;
                var name=document.getElementById("txtName").value;
                document.getElementById("pResult").innerHTML=name.trimStart();
            }
            function onClickTrimEnd(){
                debugger;
                var name=document.getElementById("txtName").value;
                document.getElementById("pResult").innerHTML=name.trimEnd();
            }
        </script>

    </head>
    <body>
        <label>Name</label>
        <input id="txtName" type="text" placeholder="enter your name"></br>
        <button id="btnUpperCase" onclick="onClickUpperCase()">Upper Case</button>
        <button id="btnLowerCase" onclick="onClickLowerCase()">Lower Case</button>
        <button id="btnTrim" onclick="onClickTrim()">Trim</button>
        <button id="btnTrimStart" onclick="onClickTrimStart()">Trim Start</button>
        <button id="btnTrimEnd" onclick="onClickTrimEnd()">Trim End </button>
        <p id="pResult"></p>
        
        
    </body>
</html>
