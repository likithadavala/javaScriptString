<!DOCTYPE html>
<html>
<head>
    <title>Numbers</title>
    <script defer>
        debugger;
        function onClickNumber() {
            var number = Number(document.getElementById("inputNumber").value);
            var result = document.getElementById("pResult");

            if (number % 2 == 0) {
                result.innerText = number + " is Even";
            } else {
                result.innerText = number + " is Odd";
            }
        }

    </script>
</head>
<body>
    <label for="numInput">Enter a number:</label>
    <input id="inputNumber" type="number"><br>

    <button id="resultbtn" onclick="onClickNumber()">Even or Odd</button>

    <p id="pResult"></p>

</body>
</html>
